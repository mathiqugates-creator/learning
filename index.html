<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            overflow:hidden;
        }

        .background{
            position:absolute;
            width:100%;
            height:100%;
            z-index:-1;
        }

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(5px);
        }

        .circle:nth-child(1){
            width:300px;
            height:300px;
            top:-100px;
            left:-100px;
        }

        .circle:nth-child(2){
            width:250px;
            height:250px;
            bottom:-80px;
            right:-80px;
        }

        .quote-card{
            width:90%;
            max-width:800px;
            padding:40px;
            border-radius:25px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            text-align:center;
            color:white;
            animation:fadeIn 1s ease;
        }

        .quote-icon{
            font-size:60px;
            opacity:0.4;
        }

        .quote-text{
            font-size:1.8rem;
            line-height:1.6;
            margin:20px 0;
            font-weight:500;
        }

        .author{
            font-size:1.2rem;
            color:#f8f9fa;
            font-weight:bold;
            margin-top:15px;
        }

        .quote-id{
            margin-top:10px;
            opacity:0.8;
            font-size:0.9rem;
        }

        button{
            margin-top:30px;
            padding:14px 35px;
            border:none;
            border-radius:50px;
            background:white;
            color:#764ba2;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        .loading{
            font-size:18px;
            color:white;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="quote-card">
        <div class="quote-icon">❝</div>

        <div id="quoteText" class="quote-text">
            Loading quote...
        </div>

        <div id="author" class="author"></div>

        <div id="quoteId" class="quote-id"></div>

        <button onclick="loadQuote()">
            Get New Quote
        </button>
    </div>

    <script>
        async function loadQuote() {
            const quoteText = document.getElementById('quoteText');
            const author = document.getElementById('author');
            const quoteId = document.getElementById('quoteId');

            quoteText.innerHTML = "Loading...";
            author.innerHTML = "";
            quoteId.innerHTML = "";

            try {
                const response = await fetch(
                    '/api/quotes/random'
                );

                if (!response.ok) {
                    throw new Error("API Error");
                }

                const data = await response.json();

                quoteText.innerHTML = `"${data.text}"`;
                author.innerHTML = `— ${data.author}`;
                quoteId.innerHTML = `Quote ID: ${data.id}`;

            } catch (error) {
                quoteText.innerHTML =
                    "Unable to load quote. Please check the API.";
                console.error(error);
            }
        }

        loadQuote();
    </script>

</body>
</html>
