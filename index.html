
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuoteVerse</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --glass: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.15);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.7);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#0f172a;
}

/* Animated Background */
body::before{
    content:'';
    position:absolute;
    inset:0;
    background:
        linear-gradient(-45deg,
        #0ea5e9,
        #8b5cf6,
        #ec4899,
        #06b6d4);
    background-size:400% 400%;
    animation:gradient 15s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Blobs */
.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    opacity:.45;
}

.blob1{
    width:350px;
    height:350px;
    background:#8b5cf6;
    top:-100px;
    left:-80px;
}

.blob2{
    width:350px;
    height:350px;
    background:#06b6d4;
    bottom:-120px;
    right:-80px;
}

.container{
    width:90%;
    max-width:900px;
    position:relative;
    z-index:2;
}

.card{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:30px;
    padding:50px;
    box-shadow:
        0 20px 50px rgba(0,0,0,.4),
        inset 0 1px 1px rgba(255,255,255,.15);
}

.logo{
    text-align:center;
    color:white;
    font-size:14px;
    letter-spacing:4px;
    text-transform:uppercase;
    opacity:.7;
}

.quote-icon{
    text-align:center;
    font-size:90px;
    color:white;
    opacity:.2;
    line-height:1;
}

.quote{
    margin-top:10px;
    color:var(--text);
    font-size:2rem;
    text-align:center;
    line-height:1.6;
    font-weight:500;
}

.author{
    text-align:center;
    margin-top:30px;
    font-size:1.2rem;
    color:white;
    font-weight:600;
}

.id{
    text-align:center;
    color:var(--muted);
    margin-top:8px;
}

.actions{
    display:flex;
    justify-content:center;
    margin-top:40px;
}

button{
    border:none;
    padding:16px 35px;
    border-radius:60px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    color:white;
    background:linear-gradient(
        135deg,
        #8b5cf6,
        #06b6d4
    );
    transition:.3s;
}

button:hover{
    transform:translateY(-4px) scale(1.03);
    box-shadow:
        0 15px 30px rgba(0,0,0,.3);
}

.loader{
    display:inline-block;
    width:22px;
    height:22px;
    border:3px solid rgba(255,255,255,.3);
    border-top:3px solid white;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.fade{
    animation:fade .6s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .card{
        padding:30px;
    }

    .quote{
        font-size:1.4rem;
    }
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

    <div class="card">

        <div class="logo">
            QUOTEVERSE
        </div>

        <div class="quote-icon">
            ❝
        </div>

        <div id="quoteText" class="quote fade">
            Loading...
        </div>

        <div id="author" class="author"></div>

        <div id="quoteId" class="id"></div>

        <div class="actions">
            <button onclick="loadQuote()">
                ✨ New Inspiration
            </button>
        </div>

    </div>

</div>

<script>

async function loadQuote(){

    const quote=document.getElementById('quoteText');
    const author=document.getElementById('author');
    const id=document.getElementById('quoteId');

    quote.innerHTML='<span class="loader"></span>';
    author.innerHTML='';
    id.innerHTML='';

    try{

        const response=await fetch('/api/quotes/random');

        const data=await response.json();

        quote.classList.remove('fade');
        void quote.offsetWidth;
        quote.classList.add('fade');

        quote.innerHTML=`"${data.text}"`;
        author.innerHTML=`— ${data.author}`;
        id.innerHTML=`Quote #${data.id}`;

    }catch(err){

        quote.innerHTML='Unable to fetch quote.';
        author.innerHTML='Please verify the API.';
    }
}

loadQuote();

</script>

</body>
</html>
