<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotewise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f4f0e8;
    --paper-edge: #e8e2d4;
    --ink: #20201d;
    --ink-soft: #5a564c;
    --rule: rgba(32,32,29,0.14);
    --accent: #b5472e;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--paper);
    font-family:'Inter', sans-serif;
    color:var(--ink);
    padding:32px;
    position:relative;
  }

  /* subtle paper grain */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.35;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.025) 0, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.025) 0, transparent 50%);
    background-size: 600px 600px;
  }

  .container{
    width:100%;
    max-width:640px;
    position:relative;
    z-index:2;
  }

  .masthead{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--rule);
    padding-bottom:14px;
    margin-bottom:48px;
  }

  .masthead .title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.05rem;
    letter-spacing:.02em;
  }

  .masthead .title em{
    font-style:italic;
    font-weight:500;
    color:var(--accent);
  }

  .masthead .tag{
    font-size:.7rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }

  .mark{
    font-family:'Fraunces', serif;
    font-size:4.5rem;
    line-height:1;
    color:var(--accent);
    opacity:.85;
    font-style:italic;
    font-weight:500;
    margin-bottom:8px;
  }

  .quote{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(1.5rem, 4vw, 2.15rem);
    line-height:1.35;
    letter-spacing:-0.01em;
    min-height:3em;
  }

  .byline{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:38px;
  }

  .byline .rule{
    width:36px;
    height:1px;
    background:var(--ink);
    opacity:.5;
  }

  .author{
    font-size:.95rem;
    font-weight:600;
    letter-spacing:.01em;
  }

  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:56px;
    padding-top:20px;
    border-top:1px solid var(--rule);
  }

  .quote-id{
    font-size:.72rem;
    letter-spacing:.08em;
    color:var(--ink-soft);
    text-transform:uppercase;
  }

  button{
    border:1px solid var(--ink);
    background:transparent;
    color:var(--ink);
    padding:11px 22px;
    font-family:'Inter', sans-serif;
    font-size:.78rem;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    cursor:pointer;
    transition: background .25s ease, color .25s ease, transform .15s ease;
    display:flex;
    align-items:center;
    gap:8px;
  }

  button:hover{
    background:var(--ink);
    color:var(--paper);
  }

  button:active{
    transform:scale(.97);
  }

  button:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }

  .spinner{
    width:13px;
    height:13px;
    border:2px solid currentColor;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:none;
  }

  button.loading .spinner{ display:inline-block; }
  button.loading .btn-label{ opacity:.6; }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  .fade-in{
    animation:fadeIn .5s cubic-bezier(.2,.8,.2,1);
  }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .error{ color:var(--accent); font-family:'Inter',sans-serif; font-size:1rem; font-weight:500; }

  @media (prefers-reduced-motion: reduce){
    .fade-in, .spinner{ animation:none; }
  }

  @media(max-width:480px){
    .masthead{ flex-direction:column; align-items:flex-start; gap:4px; }
    .meta-row{ flex-direction:column-reverse; align-items:flex-start; gap:16px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="masthead">
    <div class="title">Quote<em>eeeee</em></div>
    <div class="tag">No. <span id="quoteId">001</span></div>
  </div>

  <div class="mark">&ldquo;</div>

  <div id="quoteText" class="quote">Loading—</div>

  <div class="byline">
    <div class="rule"></div>
    <div id="author" class="author">&nbsp;</div>
  </div>

  <div class="meta-row">
    <div class="quote-id">Daily inspiration, on demand</div>
    <button id="newQuoteBtn" onclick="loadQuote()">
      <span class="spinner"></span>
      <span class="btn-label">Next quote</span>
    </button>
  </div>

</div>

<script>
  async function loadQuote(){
    const quote = document.getElementById('quoteText');
    const author = document.getElementById('author');
    const id = document.getElementById('quoteId');
    const btn = document.getElementById('newQuoteBtn');

    btn.classList.add('loading');
    btn.disabled = true;

    try{
      const response = await fetch('/api/quotes/random');
      if(!response.ok) throw new Error('Request failed');
      const data = await response.json();

      quote.classList.remove('fade-in');
      author.classList.remove('fade-in');
      void quote.offsetWidth;

      quote.textContent = data.text;
      author.textContent = `— ${data.author}`;
      id.textContent = String(data.id).padStart(3, '0');

      quote.classList.add('fade-in');
      author.classList.add('fade-in');
    }catch(err){
      quote.textContent = 'Unable to fetch a quote right now.';
      quote.classList.add('error');
      author.textContent = 'Please check the API and try again.';
    }finally{
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  loadQuote();
</script>

</body>
</html>
